<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Chat Italia Xatframe</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background: #000; }
        
        /* Sfondo Colosseo */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://xatimg.com/image/3ngpJWbfmfzh.png');
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 2;
        }

        /* Titolo */
        .header-text {
            position: absolute;
            top: 5%;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 2px 2px 10px rgba(0,0,0,1), 0 0 20px rgba(255,255,255,0.3);
            z-index: 10;
        }

        /* Mappa Italia a sinistra */
        .italy-map {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 180px;
            z-index: 10;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.6));
            opacity: 0.9;
        }

        /* Riquadro Chat Centrale */
        .frame-area {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 728px;
            height: 486px;
            border: 4px solid rgba(255, 255, 255, 0.5);
            background: rgba(0, 0, 0, 0.2);
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            z-index: 5;
        }

        /* Pannello Info a destra */
        .info-panel {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 15px;
            border: 2px solid rgba(255,255,255,0.2);
            text-align: center;
            color: white;
            z-index: 10;
            backdrop-filter: blur(10px);
            min-width: 180px;
        }

        .clock { font-size: 36px; font-weight: bold; color: #4CAF50; text-shadow: 0 0 10px rgba(76,175,80,0.5); }
        .date { font-size: 18px; margin-top: 10px; color: #FFEB3B; }

        /* Bottoni in basso */
        .nav-container {
            position: absolute;
            bottom: 5%;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 40px;
            z-index: 10;
        }

        .nav-item {
            padding: 10px 30px;
            border-radius: 8px;
            background: linear-gradient(to right, #008C45, #F4F5F0, #CD212A);
            color: #000;
            font-size: 24px;
            font-weight: bold;
            border: 2px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="overlay"></div>
    
    <div class="header-text">Chat Italia</div>
    
    <img src="https://xatimg.com/image/VD9aNV6Ef1eA.png" class="italy-map" alt="Italia">
    
    <div class="frame-area"></div>

    <div class="info-panel">
        <div id="clock" class="clock">00:00:00</div>
        <div id="date" class="date">Caricamento...</div>
    </div>

    <div class="nav-container">
        <div class="nav-item">Lobby</div>
        <div class="nav-item">Aiuto Ufficiale</div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            const options = { day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT');
            document.getElementById('date').textContent = now.toLocaleDateString('it-IT', options);
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
