<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Chat Italia Xatframe</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: black; }
        
        .slideshow {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            animation: slideAnim 24s infinite;
        }

        .slide:nth-child(1) { background-image: url('https://images.unsplash.com/photo-1552832230-c0197dd3ef1b?q=80&w=1200'); animation-delay: 0s; }
        .slide:nth-child(2) { background-image: url('https://images.unsplash.com/photo-1543439241-1194294fae7f?q=80&w=1200'); animation-delay: 6s; }
        .slide:nth-child(3) { background-image: url('https://images.unsplash.com/photo-1542640244-7e67246cd44e?q=80&w=1200'); animation-delay: 12s; }
        .slide:nth-child(4) { background-image: url('https://images.unsplash.com/photo-1533105079780-92b9be482077?q=80&w=1200'); animation-delay: 18s; }

        @keyframes slideAnim {
            0% { opacity: 0; }
            5% { opacity: 1; }
            20% { opacity: 1; }
            25% { opacity: 0; }
            100% { opacity: 0; }
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        .header-text {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: white;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            font-size: 40px;
            font-weight: bold;
            animation: glow 3s infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #008000; }
            to { text-shadow: 0 0 20px #fff, 0 0 30px #ffffff, 0 0 40px #ff0000; }
        }

        .nav-text {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 50px;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .nav-item {
            padding: 10px 20px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            transition: 0.3s;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(1.1);
        }

        .frame-area {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 728px;
            height: 486px;
            border: 5px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            background: transparent;
        }
    </style>
</head>
<body>
    <div class="slideshow">
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
    </div>
    <div class="overlay"></div>
    
    <div class="header-text">Chat Italia</div>
    
    <div class="frame-area"></div>

    <div class="nav-text">
        <div class="nav-item">Lobby</div>
        <div class="nav-item">Aiuto Ufficiale</div>
    </div>
</body>
</html>
