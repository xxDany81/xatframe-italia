<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Chat Italia Xatframe</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; background: #000; }
        
        /* Lo slideshow deve essere sopra il background del body ma sotto il resto */
        .slideshow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            animation: slideAnim 24s infinite linear;
        }

        /* Immagini ad alta affidabilità */
        .slide:nth-child(1) { background-image: url('https://images.unsplash.com/photo-1552832230-c0197dd3ef1b?w=1600'); animation-delay: 0s; }
        .slide:nth-child(2) { background-image: url('https://images.unsplash.com/photo-1516483638261-f4dbaf036963?w=1600'); animation-delay: 6s; }
        .slide:nth-child(3) { background-image: url('https://images.unsplash.com/photo-1523906834658-6e24ef2386f9?w=1600'); animation-delay: 12s; }
        .slide:nth-child(4) { background-image: url('https://images.unsplash.com/photo-1533105079780-92b9be482077?w=1600'); animation-delay: 18s; }

        @keyframes slideAnim {
            0% { opacity: 0; }
            5% { opacity: 1; }
            25% { opacity: 1; }
            30% { opacity: 0; }
            100% { opacity: 0; }
        }

        /* Overlay scuro per leggere meglio il testo */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 2;
        }

        .content {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px 0;
            box-sizing: border-box;
        }

        .header-text {
            color: white;
            text-shadow: 0 0 15px rgba(255,255,255,0.8), 2px 2px 4px rgba(0,0,0,0.9);
            font-size: 50px;
            font-weight: bold;
            margin-top: 10px;
        }

        .frame-area {
            width: 728px;
            height: 486px;
            border: 4px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 25px rgba(0,0,0,0.7);
            background: transparent;
        }

        .nav-container {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
        }

        .nav-item {
            padding: 12px 25px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            font-size: 24px;
            font-weight: bold;
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>
    <div class="slideshow">
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
    </div>
    <div class="overlay"></div>
    
    <div class="content">
        <div class="header-text">Chat Italia</div>
        
        <div class="frame-area"></div>

        <div class="nav-container">
            <div class="nav-item">Lobby</div>
            <div class="nav-item">Aiuto Ufficiale</div>
        </div>
    </div>
</body>
</html>
