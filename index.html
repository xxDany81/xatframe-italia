<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Chat Italia Xatframe - Roma Panorama Edition</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background: #000; color: white; }

        /* Slideshow Sfondo Generale */
        #slideshow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 3s ease-in-out;
        }

        .slide.active { opacity: 1; }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2;
        }

        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
        }

        .main-layout {
            position: relative;
            z-index: 10;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px 0;
            box-sizing: border-box;
        }

        .middle-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            width: 100%;
            flex-grow: 1;
        }

        .side-panel {
            width: 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 15;
            gap: 30px;
        }

        .neon-italia {
            font-size: 42px;
            font-weight: 900;
            display: flex;
            flex-direction: row;
            gap: 5px;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: neonBlink 1.5s infinite alternate;
        }

        .neon-italia span:nth-child(1) { color: #008C45; text-shadow: 0 0 10px #008C45, 0 0 20px #008C45; }
        .neon-italia span:nth-child(2) { color: #FFFFFF; text-shadow: 0 0 10px #FFFFFF, 0 0 20px #FFFFFF; }
        .neon-italia span:nth-child(3) { color: #CD212A; text-shadow: 0 0 10px #CD212A, 0 0 20px #CD212A; }

        @keyframes neonBlink {
            0%, 100% { opacity: 1; filter: brightness(1.3); }
            50% { opacity: 0.8; filter: brightness(1); }
        }

        /* Riquadro Centrale con Neon Tricolore Girevole e Panorama Roma */
        .neon-frame-wrapper {
            position: relative;
            width: 850px;
            height: 600px;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 1);
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        .neon-frame-wrapper::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: conic-gradient(#008C45, #FFFFFF, #CD212A, #008C45);
            animation: rotateNeon 4s linear infinite;
            z-index: 1;
        }

        @keyframes rotateNeon {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .frame-area {
            position: relative;
            width: 100%;
            height: 100%;
            /* Panorama di Roma al centro */
            background-image: url('https://images.unsplash.com/photo-1529260830199-42c24126f198?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
            z-index: 5;
            border-radius: 6px;
        }

        .info-box {
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
            backdrop-filter: blur(8px);
            min-width: 180px;
        }

        .clock { font-size: 36px; font-weight: bold; color: #4CAF50; }
        .date { font-size: 16px; margin-top: 5px; color: #FFEB3B; }

        .radio-player {
            background: rgba(0, 0, 0, 0.85);
            padding: 12px;
            border-radius: 20px;
            border: 2px solid #ed1c24;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            box-shadow: 0 0 20px rgba(237, 28, 36, 0.4);
            width: 160px;
        }

        .radio-btn {
            width: 45px;
            height: 45px;
            background: #ed1c24;
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        .radio-text { font-size: 11px; font-weight: bold; }

        .nav-container {
            display: flex;
            gap: 40px;
            margin-top: 15px;
            z-index: 20;
        }

        .nav-item {
            padding: 10px 30px;
            border-radius: 10px;
            background: linear-gradient(to right, #008C45, #FFFFFF, #CD212A);
            color: #000;
            font-size: 22px;
            font-weight: bold;
            border: 2px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }
    </style>
</head>
<body>
    <div id="slideshow-container"></div>
    <div class="overlay"></div>
    <div id="particles-js"></div>
    
    <div class="main-layout">
        <div class="middle-container">
            <div class="side-panel">
                <div class="neon-italia">
                    <span>ITA</span><span>L</span><span>IA</span>
                </div>
            </div>
            
            <div class="neon-frame-wrapper">
                <div class="frame-area"></div>
            </div>

            <div class="side-panel">
                <div class="info-box">
                    <div id="clock" class="clock">00:00:00</div>
                    <div id="date" class="date">Caricamento...</div>
                </div>
                
                <div class="radio-player">
                    <button class="radio-btn" id="playBtn">▶</button>
                    <div class="radio-text">RDS Live</div>
                    <audio id="audioSource" preload="none">
                        <source src="https://rds-stream.rds.it/rds.mp3" type="audio/mpeg">
                    </audio>
                </div>
            </div>
        </div>

        <div class="nav-container">
            <div class="nav-item">Lobby</div>
            <div class="nav-item">Aiuto Ufficiale</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        const dayImages = [
            'https://images.unsplash.com/photo-1552832230-c0197dd3ef1b?w=1600', 
            'https://images.unsplash.com/photo-1541432901042-2dad8a167759?w=1600',
            'https://images.unsplash.com/photo-1523906834658-6e24ef2386f9?w=1600'
        ];

        const nightImages = [
            'https://images.unsplash.com/photo-1512403714441-2a1f267672f7?w=1600', 
            'https://images.unsplash.com/photo-1520116468816-95b69f847357?w=1600', 
            'https://images.unsplash.com/photo-1516483638261-f4dbaf036963?w=1600'
        ];

        let slides = [];
        let currentSlide = 0;

        function initSlideshow() {
            const hour = new Date().getHours();
            const isDay = hour >= 6 && hour < 20;
            const images = isDay ? dayImages : nightImages;
            const container = document.getElementById('slideshow-container');
            container.innerHTML = '';
            slides = images.map((src, index) => {
                const div = document.createElement('div');
                div.className = 'slide' + (index === 0 ? ' active' : '');
                div.style.backgroundImage = `url('${src}')`;
                container.appendChild(div);
                return div;
            });
        }

        function rotateSlides() {
            if (slides.length < 2) return;
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT');
            document.getElementById('date').textContent = now.toLocaleDateString('it-IT', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        const audio = document.getElementById('audioSource');
        const playBtn = document.getElementById('playBtn');
        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playBtn.textContent = '⏸';
            } else {
                audio.pause();
                playBtn.textContent = '▶';
            }
        });

        particlesJS('particles-js', {
            "particles": {
                "number": { "value": 40, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#ffffff" },
                "opacity": { "value": 0.3, "random": true },
                "size": { "value": 2, "random": true },
                "move": { "enable": true, "speed": 0.8, "direction": "top", "random": true, "out_mode": "out" }
            }
        });

        initSlideshow();
        setInterval(updateTime, 1000);
        setInterval(rotateSlides, 30000);
        updateTime();
    </script>
</body>
</html>
