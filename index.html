<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Chat Italia Xatframe - Starry Central Fix</title>
    <style>
        /* Protezione copia */
        * {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            box-sizing: border-box;
        }

        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background: #000; color: white; }

        /* Sfondi Slideshow Esterno */
        #slideshow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 3s ease-in-out;
        }

        .slide.active { opacity: 1; }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 2;
            pointer-events: none;
        }

        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
        }

        /* Layout Principale */
        .main-layout {
            position: relative;
            z-index: 10;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .middle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            height: 100%;
            padding: 0 40px;
            pointer-events: none;
            margin-top: -30px;
        }

        /* Pannelli Laterali */
        .side-panel {
            width: 250px;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
            pointer-events: auto !important;
            z-index: 999999;
        }

        .neon-italia {
            font-size: 40px;
            font-weight: 900;
            display: flex;
            gap: 5px;
            text-transform: uppercase;
            animation: neonFlash 2.5s steps(2, start) infinite;
        }

        .neon-italia span:nth-child(1) { color: #008C45; text-shadow: 0 0 15px #008C45; }
        .neon-italia span:nth-child(2) { color: #FFFFFF; text-shadow: 0 0 15px #FFFFFF; }
        .neon-italia span:nth-child(3) { color: #CD212A; text-shadow: 0 0 15px #CD212A; }

        @keyframes neonFlash {
            0% { opacity: 1; filter: brightness(1.5); }
            50% { opacity: 0.3; filter: brightness(0.5); }
            100% { opacity: 1; filter: brightness(1.5); }
        }

        /* Riquadro Centrale 847x675 con Sfondo Stellato */
        .neon-frame-wrapper {
            position: relative;
            width: 847px;
            height: 675px;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 10px;
            pointer-events: none;
        }

        .neon-frame-wrapper::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: conic-gradient(#008C45, #FFFFFF, #CD212A, #008C45);
            animation: rotateNeon 4s linear infinite;
        }

        @keyframes rotateNeon { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .frame-area {
            position: relative;
            width: 100%;
            height: 100%;
            /* RIPRISTINATO: Sfondo Stellato Centrale */
            background-image: url('https://static.prod-images.emergentagent.com/jobs/b9e94177-ba94-422e-bb3b-a4ae806ae70d/images/fe8f8eb592a7e4f5d26f179c24e6800c378e7225fa6beffb7d9ffed6ef81b8cc.png');
            background-size: cover;
            background-position: center;
            z-index: 5;
            border-radius: 6px;
        }

        /* Elementi Destra */
        .info-box {
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
            min-width: 200px;
        }

        .clock { font-size: 38px; font-weight: bold; color: #4CAF50; }
        .date { font-size: 18px; color: #FFEB3B; }

        /* Widget Meteo */
        .weather-panel {
            background: rgba(0, 0, 0, 0.85);
            padding: 15px;
            border-radius: 15px;
            border: 2px solid #03A9F4;
            text-align: center;
            min-width: 180px;
            box-shadow: 0 0 20px rgba(3, 169, 244, 0.3);
        }

        .weather-city { font-size: 18px; font-weight: bold; color: #03A9F4; margin-bottom: 5px; text-transform: uppercase; }
        .weather-temp { font-size: 28px; font-weight: bold; color: #fff; }
        .weather-desc { font-size: 14px; color: #B0BEC5; font-style: italic; }

        /* Bottoni */
        .nav-item {
            padding: 12px 30px;
            border-radius: 10px;
            background: linear-gradient(to right, #008C45, #FFFFFF, #CD212A);
            color: #000;
            font-size: 20px;
            font-weight: bold;
            border: 2px solid white;
            cursor: pointer !important;
            pointer-events: auto !important;
            text-align: center;
            width: 220px;
        }

        /* Firma Animata Tricolore */
        .signature {
            position: fixed;
            bottom: 100px;
            right: 25px;
            font-size: 16px;
            font-weight: bold;
            z-index: 30;
            pointer-events: none;
            overflow: hidden;
            white-space: nowrap;
            border-right: 3px solid white;
            width: 0;
            animation: typing 5s steps(20) infinite, blinkCursor 0.6s step-end infinite alternate;
        }

        .signature span {
            background: linear-gradient(to right, #008C45, #FFFFFF, #CD212A);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        @keyframes typing { 0% { width: 0; } 50% { width: 170px; } 100% { width: 0; } }
        @keyframes blinkCursor { from { border-color: transparent; } to { border-color: white; } }
    </style>
</head>
<body oncontextmenu="return false;">
    <div id="slideshow-container"></div>
    <div class="overlay"></div>
    <div id="particles-js"></div>
    
    <div class="main-layout">
        <div class="middle-container">
            <div class="side-panel">
                <div class="neon-italia">
                    <span>ITA</span><span>L</span><span>IA</span>
                </div>
                <div class="nav-item" onclick="window.open('https://xat.com/italia', '_blank')">Lobby</div>
            </div>
            
            <div class="neon-frame-wrapper">
                <div class="frame-area"></div>
            </div>

            <div class="side-panel">
                <div class="info-box">
                    <div id="clock" class="clock">00:00:00</div>
                    <div id="date" class="date">Caricamento...</div>
                </div>
                
                <div class="weather-panel" id="weatherBox">
                    <div class="weather-city" id="city">Roma</div>
                    <div class="weather-temp" id="temp">--°C</div>
                    <div class="weather-desc" id="desc">Caricamento...</div>
                </div>

                <div class="nav-item" onclick="window.open('https://xat.com/italia', '_blank')">Aiuto Ufficiale</div>
            </div>
        </div>
    </div>

    <div class="signature"><span>Created by xDany81</span></div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        const cities = ['Rome', 'Naples', 'Milan', 'Florence', 'Messina', 'Cagliari'];
        const cityLabels = {'Rome': 'Roma', 'Naples': 'Napoli', 'Milan': 'Milano', 'Florence': 'Firenze', 'Messina': 'Messina', 'Cagliari': 'Cagliari'};
        let cityIndex = 0;

        async function updateWeather() {
            const city = cities[cityIndex];
            try {
                const response = await fetch(`https://wttr.in/${city}?format=j1`);
                const data = await response.json();
                const temp = data.current_condition[0].temp_C;
                const desc = data.current_condition[0].lang_it ? data.current_condition[0].lang_it[0].value : data.current_condition[0].weatherDesc[0].value;
                document.getElementById('city').textContent = cityLabels[city];
                document.getElementById('temp').textContent = `${temp}°C`;
                document.getElementById('desc').textContent = desc;
                cityIndex = (cityIndex + 1) % cities.length;
            } catch (e) { console.error("Meteo error", e); }
        }

        setInterval(updateWeather, 10000);
        updateWeather();

        function updateTime() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT');
            document.getElementById('date').textContent = now.toLocaleDateString('it-IT', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        const slideImages = [
            'https://xatimg.com/image/Cl2N4BF0UMl5.jpg',
            'https://xatimg.com/image/ab3gnYjzL1c6.png',
            'https://xatimg.com/image/DPul54EmaEI0.jpg',
            'https://xatimg.com/image/aAxqCrakxV2p.jpg',
            'https://xatimg.com/image/EUgXK1NEFyhY.jpg',
            'https://xatimg.com/image/NfOPNQLoKdXi.jpg'
        ];

        function initSlideshow() {
            const container = document.getElementById('slideshow-container');
            container.innerHTML = '';
            slideImages.map((src, i) => {
                const div = document.createElement('div');
                div.className = 'slide' + (i === 0 ? ' active' : '');
                div.style.backgroundImage = `url('${src}')`;
                container.appendChild(div);
            });
        }

        function rotateSlides() {
            const slides = document.querySelectorAll('.slide');
            let current = 0;
            slides.forEach((s, i) => { if(s.classList.contains('active')) current = i; });
            slides[current].classList.remove('active');
            slides[(current + 1) % slides.length].classList.add('active');
        }

        initSlideshow();
        setInterval(updateTime, 1000);
        setInterval(rotateSlides, 30000);
        updateTime();

        particlesJS('particles-js', {
            "particles": {
                "number": { "value": 40 },
                "color": { "value": "#ffffff" },
                "opacity": { "value": 0.3 },
                "size": { "value": 2 },
                "move": { "enable": true, "speed": 0.8, "direction": "top" }
            }
        });
    </script>
</body>
</html>
