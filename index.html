<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Chat Italia Xatframe - HD 30s</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background: #000; }

        #slideshow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 3s ease-in-out;
        }

        .slide.active { opacity: 1; }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 2;
        }

        .content {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            color: white;
        }

        .header-text {
            font-size: 55px;
            font-weight: bold;
            text-shadow: 3px 3px 12px rgba(0,0,0,0.9);
            margin-top: 15px;
        }

        .italy-map {
            position: absolute;
            left: 40px;
            top: 50%;
            transform: translateY(-50%);
            width: 160px;
            z-index: 11;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.7));
        }

        .frame-area {
            width: 728px;
            height: 486px;
            border: 5px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            background: transparent;
        }

        .info-panel {
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.3);
            text-align: center;
            backdrop-filter: blur(12px);
            z-index: 11;
        }

        .clock { font-size: 42px; font-weight: bold; color: #4CAF50; }
        .date { font-size: 20px; margin-top: 8px; color: #FFEB3B; }

        .nav-container {
            display: flex;
            gap: 40px;
            margin-bottom: 25px;
        }

        .nav-item {
            padding: 12px 35px;
            border-radius: 12px;
            background: linear-gradient(to right, #008C45, #FFFFFF, #CD212A);
            color: black;
            font-size: 26px;
            font-weight: bold;
            border: 2px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
        }
    </style>
</head>
<body>
    <div id="slideshow-container"></div>
    <div class="overlay"></div>
    
    <div class="content">
        <div class="header-text">Chat Italia</div>
        
        <img src="https://xatimg.com/image/VD9aNV6Ef1eA.png" class="italy-map" alt="Italia">
        
        <div class="frame-area"></div>

        <div class="info-panel">
            <div id="clock" class="clock">00:00:00</div>
            <div id="date" class="date">Caricamento...</div>
        </div>

        <div class="nav-container">
            <div class="nav-item">Lobby</div>
            <div class="nav-item">Aiuto Ufficiale</div>
        </div>
    </div>

    <script>
        const dayImages = [
            'https://images.unsplash.com/photo-1552832230-c0197dd3ef1b?w=1600', // Colosseo
            'https://images.unsplash.com/photo-1541432901042-2dad8a167759?w=1600', // Firenze
            'https://images.unsplash.com/photo-1523906834658-6e24ef2386f9?w=1600'  // Venezia
        ];

        const nightImages = [
            'https://images.unsplash.com/photo-1512403714441-2a1f267672f7?w=1600', // Colosseo Notte
            'https://images.unsplash.com/photo-1520116468816-95b69f847357?w=1600', // Firenze Notte
            'https://images.unsplash.com/photo-1516483638261-f4dbaf036963?w=1600'  // Venezia Notte
        ];

        let slides = [];
        let currentSlide = 0;

        function initSlideshow() {
            const hour = new Date().getHours();
            const isDay = hour >= 6 && hour < 19;
            const images = isDay ? dayImages : nightImages;
            const container = document.getElementById('slideshow-container');
            
            container.innerHTML = '';
            slides = images.map((src, index) => {
                const div = document.createElement('div');
                div.className = 'slide' + (index === 0 ? ' active' : '');
                div.style.backgroundImage = `url('${src}')`;
                container.appendChild(div);
                return div;
            });
        }

        function rotateSlides() {
            if (slides.length < 2) return;
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT');
            document.getElementById('date').textContent = now.toLocaleDateString('it-IT', { day: 'numeric', month: 'long', year: 'numeric' });
            if (now.getMinutes() === 0 && now.getSeconds() === 0) initSlideshow();
        }

        initSlideshow();
        setInterval(updateTime, 1000);
        setInterval(rotateSlides, 30000); // 30 secondi per ogni foto
        updateTime();
    </script>
</body>
</html>
