<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Chat Italia Xatframe</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: black; }
        
        .slideshow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            animation: slideAnim 24s infinite linear;
        }

        /* Immagini dirette e sicure */
        .slide:nth-child(1) { background-image: url('https://images.unsplash.com/photo-1552832230-c0197dd3ef1b?auto=format&fit=crop&w=1200&q=80'); animation-delay: 0s; }
        .slide:nth-child(2) { background-image: url('https://images.unsplash.com/photo-1543439241-1194294fae7f?auto=format&fit=crop&w=1200&q=80'); animation-delay: 6s; }
        .slide:nth-child(3) { background-image: url('https://images.unsplash.com/photo-1542640244-7e67246cd44e?auto=format&fit=crop&w=1200&q=80'); animation-delay: 12s; }
        .slide:nth-child(4) { background-image: url('https://images.unsplash.com/photo-1533105079780-92b9be482077?auto=format&fit=crop&w=1200&q=80'); animation-delay: 18s; }

        @keyframes slideAnim {
            0% { opacity: 0; }
            5% { opacity: 1; }
            20% { opacity: 1; }
            25% { opacity: 0; }
            100% { opacity: 0; }
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: -1;
        }

        .header-text {
            position: absolute;
            top: 15px;
            width: 100%;
            text-align: center;
            color: white;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.9);
            font-size: 45px;
            font-weight: bold;
            z-index: 10;
        }

        .nav-text {
            position: absolute;
            bottom: 25px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 40px;
            color: white;
            font-size: 26px;
            font-weight: bold;
            z-index: 10;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
        }

        .frame-area {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 728px;
            height: 486px;
            border: 4px solid rgba(255, 255, 255, 0.4);
            background: transparent;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>
    <div class="slideshow">
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
    </div>
    <div class="overlay"></div>
    
    <div class="header-text">Chat Italia</div>
    
    <div class="frame-area"></div>

    <div class="nav-text">
        <span>Lobby</span>
        <span>Aiuto Ufficiale</span>
    </div>
</body>
</html>
