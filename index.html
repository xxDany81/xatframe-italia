<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Chat Italia Xatframe - Final Build</title>
    <style>
        /* Protezione copia */
        * {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            box-sizing: border-box;
        }

        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background: #000; color: white; }

        /* Sfondi */
        #slideshow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 3s ease-in-out;
        }

        .slide.active { opacity: 1; }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 2;
            pointer-events: none;
        }

        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
        }

        /* Layout Principale */
        .main-layout {
            position: relative;
            z-index: 1000;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none; /* Lascia passare i clic alla chat */
        }

        .middle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            height: 100%;
            padding: 0 40px;
            pointer-events: none;
        }

        /* Pannelli Laterali */
        .side-panel {
            width: 250px;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
            pointer-events: auto !important;
            z-index: 999999;
        }

        .neon-italia {
            font-size: 40px;
            font-weight: 900;
            display: flex;
            gap: 5px;
            text-transform: uppercase;
            animation: neonBlink 1.5s infinite alternate;
        }

        .neon-italia span:nth-child(1) { color: #008C45; text-shadow: 0 0 15px #008C45; }
        .neon-italia span:nth-child(2) { color: #FFFFFF; text-shadow: 0 0 15px #FFFFFF; }
        .neon-italia span:nth-child(3) { color: #CD212A; text-shadow: 0 0 15px #CD212A; }

        @keyframes neonBlink { from { opacity: 1; } to { opacity: 0.7; } }

        /* Riquadro Centrale */
        .neon-frame-wrapper {
            position: relative;
            width: 850px;
            height: 600px;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 10px;
            pointer-events: none;
        }

        .neon-frame-wrapper::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: conic-gradient(#008C45, #FFFFFF, #CD212A, #008C45);
            animation: rotateNeon 4s linear infinite;
        }

        @keyframes rotateNeon { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .frame-area {
            position: relative;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1529260830199-42c24126f198?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
            z-index: 5;
            border-radius: 6px;
        }

        /* Elementi Destra */
        .info-box {
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 15px;
            border: 2px solid rgba(255,255,255,0.2);
            text-align: center;
            min-width: 200px;
        }

        .clock { font-size: 38px; font-weight: bold; color: #4CAF50; }
        .date { font-size: 18px; color: #FFEB3B; }

        /* Player Radio */
        .radio-player {
            background: rgba(0, 0, 0, 0.9);
            padding: 20px;
            border-radius: 25px;
            border: 3px solid #00ffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            box-shadow: 0 0 25px #00ffff;
            cursor: pointer !important;
            pointer-events: auto !important;
        }

        .radio-btn {
            width: 60px;
            height: 60px;
            background: #00ffff;
            border-radius: 50%;
            border: none;
            color: black;
            font-size: 28px;
            cursor: pointer !important;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .radio-text { font-size: 12px; font-weight: bold; color: #00ffff; }

        /* Bottoni */
        .nav-item {
            padding: 12px 30px;
            border-radius: 10px;
            background: linear-gradient(to right, #008C45, #FFFFFF, #CD212A);
            color: #000;
            font-size: 20px;
            font-weight: bold;
            border: 2px solid white;
            cursor: pointer !important;
            pointer-events: auto !important;
            text-align: center;
            width: 220px;
        }

        .signature {
            position: fixed;
            bottom: 60px;
            right: 25px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            z-index: 30;
        }
    </style>
</head>
<body oncontextmenu="return false;">
    <div id="slideshow-container"></div>
    <div class="overlay"></div>
    <div id="particles-js"></div>
    
    <div class="main-layout">
        <div class="middle-container">
            <div class="side-panel">
                <div class="neon-italia">
                    <span>ITA</span><span>L</span><span>IA</span>
                </div>
                <!-- Lobby Button -->
                <div class="nav-item" onclick="window.open('https://xat.com/italia', '_blank')">Lobby</div>
            </div>
            
            <div class="neon-frame-wrapper">
                <div class="frame-area"></div>
            </div>

            <div class="side-panel">
                <div class="info-box">
                    <div id="clock" class="clock">00:00:00</div>
                    <div id="date" class="date">Caricamento...</div>
                </div>
                
                <div class="radio-player" id="radioContainer">
                    <button class="radio-btn" id="playBtn">▶</button>
                    <div class="radio-text">Dance Radio UK</div>
                    <audio id="audioSource">
                        <source src="https://boxstream.danceradiouk.com/stream/1/" type="audio/mpeg">
                    </audio>
                </div>

                <!-- Aiuto Ufficiale Button -->
                <div class="nav-item" onclick="window.open('https://xat.com/italia', '_blank')">Aiuto Ufficiale</div>
            </div>
        </div>
    </div>

    <div class="signature">Created by xDany81</div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        const audio = document.getElementById('audioSource');
        const playBtn = document.getElementById('playBtn');
        const radioContainer = document.getElementById('radioContainer');

        function toggleRadio() {
            if (audio.paused) {
                audio.play().then(() => {
                    playBtn.textContent = '⏸';
                }).catch(e => alert("Clicca di nuovo per attivare l'audio!"));
            } else {
                audio.pause();
                playBtn.textContent = '▶';
            }
        }

        playBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleRadio(); });
        radioContainer.addEventListener('click', toggleRadio);

        const dayImages = ['https://images.unsplash.com/photo-1552832230-c0197dd3ef1b?w=1600', 'https://images.unsplash.com/photo-1541432901042-2dad8a167759?w=1600', 'https://images.unsplash.com/photo-1523906834658-6e24ef2386f9?w=1600'];
        const nightImages = ['https://images.unsplash.com/photo-1512403714441-2a1f267672f7?w=1600', 'https://images.unsplash.com/photo-1520116468816-95b69f847357?w=1600', 'https://images.unsplash.com/photo-1516483638261-f4dbaf036963?w=1600'];

        let currentSlide = 0;
        let slides = [];

        function initSlideshow() {
            const hour = new Date().getHours();
            const images = (hour >= 6 && hour < 20) ? dayImages : nightImages;
            const container = document.getElementById('slideshow-container');
            container.innerHTML = '';
            slides = images.map((src, i) => {
                const div = document.createElement('div');
                div.className = 'slide' + (i === 0 ? ' active' : '');
                div.style.backgroundImage = `url('${src}')`;
                container.appendChild(div);
                return div;
            });
        }

        function rotateSlides() {
            if (slides.length < 2) return;
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT');
            document.getElementById('date').textContent = now.toLocaleDateString('it-IT', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        initSlideshow();
        setInterval(updateTime, 1000);
        setInterval(rotateSlides, 30000);
        updateTime();
    </script>
</body>
</html>
