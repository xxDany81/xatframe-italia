<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Chat Italia Xatframe - Giorno e Notte</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background: #000; color: white; }
        
        /* Sfondo Slideshow */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }

        .slide.active { opacity: 1; }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 2;
        }

        /* Titolo */
        .header-text {
            position: absolute;
            top: 30px;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 50px;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(255,255,255,0.6), 2px 2px 5px black;
            z-index: 10;
        }

        /* Mappa Italia a sinistra */
        .italy-map {
            position: absolute;
            left: 30px;
            top: 50%;
            transform: translateY(-50%);
            width: 160px;
            z-index: 10;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
        }

        /* Riquadro Chat */
        .frame-area {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 728px;
            height: 486px;
            border: 4px solid rgba(255, 255, 255, 0.4);
            background: rgba(0, 0, 0, 0.1);
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            z-index: 5;
        }

        /* Orologio e Data a destra */
        .info-panel {
            position: absolute;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        .clock { font-size: 38px; font-weight: bold; color: #4CAF50; }
        .date { font-size: 18px; margin-top: 5px; color: #FFEB3B; }
        .cycle-status { font-size: 14px; margin-top: 10px; color: #03A9F4; font-style: italic; }

        /* Bottoni */
        .nav-container {
            position: absolute;
            bottom: 40px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 40px;
            z-index: 10;
        }

        .nav-item {
            padding: 12px 35px;
            border-radius: 10px;
            background: linear-gradient(to bottom, #008C45 0%, #008C45 33%, #F4F5F0 33%, #F4F5F0 66%, #CD212A 66%, #CD212A 100%);
            color: black;
            font-size: 26px;
            font-weight: bold;
            border: 2px solid white;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div id="slideshow" class="background-container"></div>
    <div class="overlay"></div>
    
    <div class="header-text">Chat Italia</div>
    
    <img src="https://xatimg.com/image/VD9aNV6Ef1eA.png" class="italy-map" alt="Italia">
    
    <div class="frame-area"></div>

    <div class="info-panel">
        <div id="clock" class="clock">00:00:00</div>
        <div id="date" class="date">Caricamento...</div>
        <div id="cycle" class="cycle-status">Modalità automatica</div>
    </div>

    <div class="nav-container">
        <div class="nav-item">Lobby</div>
        <div class="nav-item">Aiuto Ufficiale</div>
    </div>

    <script>
        const imagesDay = [
            'https://images.unsplash.com/photo-1552832230-c0197dd3ef1b?w=1600',
            'https://images.unsplash.com/photo-1543439241-1194294fae7f?w=1600',
            'https://images.unsplash.com/photo-1523906834658-6e24ef2386f9?w=1600',
            'https://images.unsplash.com/photo-1533105079780-92b9be482077?w=1600'
        ];

        const imagesNight = [
            'https://images.unsplash.com/photo-1512403714441-2a1f267672f7?w=1600',
            'https://images.unsplash.com/photo-1493246318656-5bbd4afb2978?w=1600',
            'https://images.unsplash.com/photo-1522066606785-f53835f850e0?w=1600',
            'https://images.unsplash.com/photo-1520116468816-95b69f847357?w=1600'
        ];

        let currentSlideIndex = 0;
        const slideshowContainer = document.getElementById('slideshow');

        function updateSlides() {
            const now = new Date();
            const hour = now.getHours();
            const isDay = hour >= 6 && hour < 19;
            const currentImages = isDay ? imagesDay : imagesNight;
            
            document.getElementById('cycle').textContent = isDay ? '☀️ Ciclo Giorno' : '🌙 Ciclo Notte';

            // Svuota e ricrea slides se necessario (o semplicemente aggiorna immagini)
            slideshowContainer.innerHTML = '';
            currentImages.forEach((src, index) => {
                const div = document.createElement('div');
                div.className = 'slide' + (index === currentSlideIndex ? ' active' : '');
                div.style.backgroundImage = `url('${src}')`;
                slideshowContainer.appendChild(div);
            });
        }

        function nextSlide() {
            const slides = document.querySelectorAll('.slide');
            if (slides.length === 0) return;
            
            slides[currentSlideIndex].classList.remove('active');
            currentSlideIndex = (currentSlideIndex + 1) % slides.length;
            slides[currentSlideIndex].classList.add('active');
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT');
            document.getElementById('date').textContent = now.toLocaleDateString('it-IT', { day: 'numeric', month: 'long', year: 'numeric' });
            
            // Ogni ora ricontrolla se siamo in modalità giorno o notte
            if (now.getMinutes() === 0 && now.getSeconds() === 0) {
                updateSlides();
            }
        }

        // Inizializzazione
        updateSlides();
        setInterval(updateClock, 1000);
        setInterval(nextSlide, 10000); // Cambia foto ogni 10 secondi
        updateClock();
    </script>
</body>
</html>
