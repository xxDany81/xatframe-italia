<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Chat Italia Xatframe - Weather Edition</title>
    <style>
        /* Protezione globale */
        * {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            box-sizing: border-box;
        }

        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background: #000; color: white; }

        /* Sfondi */
        #slideshow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 3s ease-in-out;
        }

        .slide.active { opacity: 1; }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 2;
            pointer-events: none;
        }

        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
        }

        /* Layout Principale */
        .main-layout {
            position: relative;
            z-index: 10;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .middle-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 0 10px;
            pointer-events: none;
            margin-top: -40px;
        }

        .side-panel {
            width: 250px;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 25px;
            pointer-events: auto;
            z-index: 999999;
        }

        /* Scritta ITALIA Neon */
        .neon-italia {
            font-size: 38px;
            font-weight: 900;
            display: flex;
            gap: 5px;
            text-transform: uppercase;
            animation: neonBlink 1.5s infinite alternate;
        }

        .neon-italia span:nth-child(1) { color: #008C45; text-shadow: 0 0 15px #008C45; }
        .neon-italia span:nth-child(2) { color: #FFFFFF; text-shadow: 0 0 15px #FFFFFF; }
        .neon-italia span:nth-child(3) { color: #CD212A; text-shadow: 0 0 15px #CD212A; }

        @keyframes neonBlink { from { opacity: 1; } to { opacity: 0.7; } }

        /* Riquadro Centrale 847x675 */
        .neon-frame-wrapper {
            position: relative;
            width: 847px;
            height: 675px;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            pointer-events: none;
        }

        .neon-frame-wrapper::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: conic-gradient(#008C45, #FFFFFF, #CD212A, #008C45);
            animation: rotateNeon 4s linear infinite;
        }

        @keyframes rotateNeon { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .frame-area {
            position: relative;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1529260830199-42c24126f198?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
            z-index: 5;
            border-radius: 6px;
        }

        /* Pannello Orologio */
        .info-box {
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
            min-width: 180px;
        }

        .clock { font-size: 32px; font-weight: bold; color: #4CAF50; }
        .date { font-size: 15px; color: #FFEB3B; }

        /* Pannello Meteo Italiano */
        .weather-panel {
            background: rgba(0, 0, 0, 0.85);
            padding: 15px;
            border-radius: 15px;
            border: 2px solid #03A9F4;
            text-align: center;
            min-width: 180px;
            box-shadow: 0 0 20px rgba(3, 169, 244, 0.3);
            transition: all 0.5s ease;
        }

        .weather-city { font-size: 18px; font-weight: bold; color: #03A9F4; margin-bottom: 5px; text-transform: uppercase; }
        .weather-temp { font-size: 28px; font-weight: bold; color: #fff; }
        .weather-desc { font-size: 14px; color: #B0BEC5; font-style: italic; }

        /* Bottoni */
        .nav-item {
            padding: 10px 20px;
            border-radius: 10px;
            background: linear-gradient(to right, #008C45, #FFFFFF, #CD212A);
            color: #000;
            font-size: 18px;
            font-weight: bold;
            border: 2px solid white;
            cursor: pointer !important;
            text-align: center;
            width: 200px;
        }

        .signature {
            position: fixed;
            bottom: 40px;
            right: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            z-index: 30;
        }
    </style>
</head>
<body oncontextmenu="return false;">
    <div id="slideshow-container"></div>
    <div class="overlay"></div>
    <div id="particles-js"></div>
    
    <div class="main-layout">
        <div class="middle-container">
            <div class="side-panel">
                <div class="neon-italia">
                    <span>ITA</span><span>L</span><span>IA</span>
                </div>
                <div class="nav-item" onclick="window.top.location.href='https://xat.com/italia'">Lobby</div>
            </div>
            
            <div class="neon-frame-wrapper">
                <div class="frame-area"></div>
            </div>

            <div class="side-panel">
                <div class="info-box">
                    <div id="clock" class="clock">00:00:00</div>
                    <div id="date" class="date">Caricamento...</div>
                </div>
                
                <!-- Widget Meteo -->
                <div class="weather-panel" id="weatherBox">
                    <div class="weather-city" id="city">Roma</div>
                    <div class="weather-temp" id="temp">--°C</div>
                    <div class="weather-desc" id="desc">Caricamento...</div>
                </div>

                <div class="nav-item" onclick="window.top.location.href='https://xat.com/italia'">Aiuto Ufficiale</div>
            </div>
        </div>
    </div>

    <div class="signature">Created by xDany81</div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        const cities = ['Rome', 'Naples', 'Milan', 'Florence', 'Messina', 'Cagliari'];
        const cityLabels = {'Rome': 'Roma', 'Naples': 'Napoli', 'Milan': 'Milano', 'Florence': 'Firenze', 'Messina': 'Messina', 'Cagliari': 'Cagliari'};
        let cityIndex = 0;

        async function updateWeather() {
            const city = cities[cityIndex];
            try {
                const response = await fetch(`https://wttr.in/${city}?format=j1`);
                const data = await response.json();
                const temp = data.current_condition[0].temp_C;
                const desc = data.current_condition[0].lang_it ? data.current_condition[0].lang_it[0].value : data.current_condition[0].weatherDesc[0].value;
                
                document.getElementById('city').textContent = cityLabels[city];
                document.getElementById('temp').textContent = `${temp}°C`;
                document.getElementById('desc').textContent = desc;
                
                cityIndex = (cityIndex + 1) % cities.length;
            } catch (e) {
                console.error("Errore meteo", e);
            }
        }

        setInterval(updateWeather, 10000); // Cambia città ogni 10 secondi
        updateWeather();

        function updateTime() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT');
            document.getElementById('date').textContent = now.toLocaleDateString('it-IT', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        const dayImages = ['https://images.unsplash.com/photo-1552832230-c0197dd3ef1b?w=1600', 'https://images.unsplash.com/photo-1541432901042-2dad8a167759?w=1600', 'https://images.unsplash.com/photo-1523906834658-6e24ef2386f9?w=1600'];
        const nightImages = ['https://images.unsplash.com/photo-1512403714441-2a1f267672f7?w=1600', 'https://images.unsplash.com/photo-1520116468816-95b69f847357?w=1600', 'https://images.unsplash.com/photo-1516483638261-f4dbaf036963?w=1600'];

        function initSlideshow() {
            const hour = new Date().getHours();
            const images = (hour >= 6 && hour < 20) ? dayImages : nightImages;
            const container = document.getElementById('slideshow-container');
            container.innerHTML = '';
            images.map((src, i) => {
                const div = document.createElement('div');
                div.className = 'slide' + (i === 0 ? ' active' : '');
                div.style.backgroundImage = `url('${src}')`;
                container.appendChild(div);
            });
        }

        function rotateSlides() {
            const slides = document.querySelectorAll('.slide');
            let current = 0;
            slides.forEach((s, i) => { if(s.classList.contains('active')) current = i; });
            slides[current].classList.remove('active');
            slides[(current + 1) % slides.length].classList.add('active');
        }

        initSlideshow();
        setInterval(updateTime, 1000);
        setInterval(rotateSlides, 30000);
        updateTime();

        particlesJS('particles-js', {
            "particles": {
                "number": { "value": 40 },
                "color": { "value": "#ffffff" },
                "opacity": { "value": 0.3 },
                "size": { "value": 2 },
                "move": { "enable": true, "speed": 0.8, "direction": "top" }
            }
        });
    </script>
</body>
</html>
