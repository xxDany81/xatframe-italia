<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Chat Italia Xatframe - HD</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background: #000; }

        /* Slideshow */
        #slideshow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .slide.active { opacity: 1; }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 2;
        }

        .content {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            color: white;
        }

        .header-text {
            font-size: 55px;
            font-weight: bold;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.9);
            margin-top: 10px;
        }

        .italy-map {
            position: absolute;
            left: 40px;
            top: 50%;
            transform: translateY(-50%);
            width: 150px;
            z-index: 11;
            filter: drop-shadow(0 0 10px white);
        }

        .frame-area {
            width: 728px;
            height: 486px;
            border: 5px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            background: transparent;
        }

        .info-panel {
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.3);
            text-align: center;
            backdrop-filter: blur(10px);
            z-index: 11;
        }

        .clock { font-size: 40px; font-weight: bold; color: #4CAF50; }
        .date { font-size: 18px; margin-top: 5px; color: #FFEB3B; }

        .nav-container {
            display: flex;
            gap: 40px;
            margin-bottom: 20px;
        }

        .nav-item {
            padding: 10px 30px;
            border-radius: 10px;
            background: linear-gradient(to right, #008C45, #FFFFFF, #CD212A);
            color: black;
            font-size: 24px;
            font-weight: bold;
            border: 2px solid white;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }
    </style>
</head>
<body>
    <div id="slideshow-container">
        <!-- Slides verranno inserite dal JS -->
    </div>
    <div class="overlay"></div>
    
    <div class="content">
        <div class="header-text">Chat Italia</div>
        
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/ca/Map_of_Italy_with_regions_and_provinces.svg/512px-Map_of_Italy_with_regions_and_provinces.svg.png" class="italy-map" alt="Italia">
        
        <div class="frame-area"></div>

        <div class="info-panel">
            <div id="clock" class="clock">00:00:00</div>
            <div id="date" class="date">Caricamento...</div>
        </div>

        <div class="nav-container">
            <div class="nav-item">Lobby</div>
            <div class="nav-item">Aiuto Ufficiale</div>
        </div>
    </div>

    <script>
        const dayImages = [
            'https://xatimg.com/image/3ngpJWbfmfzh.png', // Colosseo
            'https://images.unsplash.com/photo-1543439241-1194294fae7f?w=1600', // Firenze
            'https://images.unsplash.com/photo-1523906834658-6e24ef2386f9?w=1600'  // Venezia
        ];

        const nightImages = [
            'https://images.unsplash.com/photo-1512403714441-2a1f267672f7?w=1600', // Colosseo Notte
            'https://images.unsplash.com/photo-1516483638261-f4dbaf036963?w=1600', // Venezia Notte
            'https://images.unsplash.com/photo-1493246318656-5bbd4afb2978?w=1600'  // Roma Notte
        ];

        let slides = [];
        let currentSlide = 0;

        function initSlideshow() {
            const hour = new Date().getHours();
            const isDay = hour >= 6 && hour < 19;
            const images = isDay ? dayImages : nightImages;
            const container = document.getElementById('slideshow-container');
            
            container.innerHTML = '';
            slides = images.map((src, index) => {
                const div = document.createElement('div');
                div.className = 'slide' + (index === 0 ? ' active' : '');
                div.style.backgroundImage = `url('${src}')`;
                container.appendChild(div);
                return div;
            });
        }

        function rotateSlides() {
            if (slides.length === 0) return;
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT');
            document.getElementById('date').textContent = now.toLocaleDateString('it-IT', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        initSlideshow();
        setInterval(updateTime, 1000);
        setInterval(rotateSlides, 8000);
        updateTime();

        // Ogni ora resetta lo slideshow per cambiare tra giorno e notte
        setInterval(() => {
            const now = new Date();
            if (now.getMinutes() === 0) initSlideshow();
        }, 60000);
    </script>
</body>
</html>
